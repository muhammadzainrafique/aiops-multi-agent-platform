name: FYP AI Agent

on:
  push:
    branches: ["**"]

jobs:
  summarize-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run FYP Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
          REPO_NAME: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: python .github/scripts/fyp_agent.py

      - name: Commit updated CHANGELOG
        run: |
          git config user.name "FYP Agent"
          git config user.email "fyp-agent@noreply"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: auto-update CHANGELOG [skip ci]"
          git push