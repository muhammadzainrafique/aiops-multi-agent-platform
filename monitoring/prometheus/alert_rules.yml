# monitoring/prometheus/alert_rules.yml
# Prometheus alerting rules for the AIOps platform.
# These fire into AlertManager which POSTs to the Supervisor webhook.

groups:

  - name: pod_health
    interval: 30s
    rules:

      # Fires when a pod has restarted more than 3 times in 10 minutes
      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[10m]) * 600 > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: >
            Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted
            {{ $value | printf "%.0f" }} times in the last 10 minutes.

      # Fires when a pod has been in a non-running state for over 5 minutes
      - alert: PodNotReady
        expr: |
          kube_pod_status_ready{condition="true"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is not ready"
          description: >
            Pod {{ $labels.namespace }}/{{ $labels.pod }} has been
            not ready for more than 5 minutes.

  - name: resource_pressure
    interval: 30s
    rules:

      # Fires when node memory usage exceeds 85%
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: >
            Memory usage is {{ $value | printf "%.1f" }}%
            on instance {{ $labels.instance }}.

      # Fires when CPU usage exceeds 80% for 5 minutes
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: >
            CPU usage is {{ $value | printf "%.1f" }}%
            on instance {{ $labels.instance }}.

  - name: deployment_health
    interval: 30s
    rules:

      # Fires when a deployment has 0 available replicas
      - alert: DeploymentUnavailable
        expr: |
          kube_deployment_status_replicas_available == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Deployment {{ $labels.deployment }} has no available replicas"
          description: >
            Deployment {{ $labels.namespace }}/{{ $labels.deployment }}
            has had 0 available replicas for more than 2 minutes.
