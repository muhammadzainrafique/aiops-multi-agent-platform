apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "pods/log",
                "services", "endpoints", "persistentvolumeclaims",
                "events", "configmaps"]
    verbs: ["get", "list", "watch", "delete", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "replicasets",
                "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-binding
subjects:
  - kind: ServiceAccount
    name: aiops-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: aiops-agent-role
  apiGroup: rbac.authorization.k8s.io
