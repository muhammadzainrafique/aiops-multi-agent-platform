# infra/kubernetes/agents/rbac.yml
# RBAC rules — agents need permission to read/delete pods and scale deployments.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-binding
subjects:
  - kind: ServiceAccount
    name: aiops-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: aiops-agent-role
  apiGroup: rbac.authorization.k8s.io
